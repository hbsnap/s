name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Export build env vars
        run: echo "$BUILD_ENV" >> $GITHUB_ENV
        env:
          BUILD_ENV: ${{ vars.BUILD_ENV }}
      - run: npm run build
      - run: cp build/404/index.html build/404.html
      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
