name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Export build env vars
        run: echo "$BUILD_ENV" >> $GITHUB_ENV
        env:
          BUILD_ENV: ${{ vars.BUILD_ENV }}
      - name: Build site
        run: npm run build
        env:
          BASE_PATH: '/${{ github.event.repository.name }}'
      - name: Copy 404 fallback
        run: cp build/404/index.html build/404.html
      - name: Deploy to Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
